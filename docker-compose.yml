services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proxmon-backend
    restart: unless-stopped
    env_file: ./backend/.env
    network_mode: "host"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proxmon-frontend
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      - backend
